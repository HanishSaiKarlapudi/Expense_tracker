<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <circle cx="100" cy="100" r="100" fill="#f5f5f5"/>
  
  <!-- Head/Graduation Cap -->
  <g id="head">
    <!-- Graduation cap -->
    <rect x="70" y="30" width="60" height="8" fill="#1a472a" rx="2"/>
    <polygon points="100,38 75,48 125,48" fill="#2d5a3d"/>
    <circle cx="100" cy="30" r="4" fill="#ffd700"/>
    
    <!-- Face -->
    <circle cx="100" cy="55" r="20" fill="#f4a460"/>
    
    <!-- Eyes -->
    <circle cx="92" cy="50" r="2.5" fill="#333"/>
    <circle cx="108" cy="50" r="2.5" fill="#333"/>
    
    <!-- Smile -->
    <path d="M 92 58 Q 100 62 108 58" stroke="#333" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    
    <!-- Glasses -->
    <rect x="82" y="45" width="10" height="8" fill="none" stroke="#333" stroke-width="1.5" rx="2"/>
    <rect x="106" y="45" width="10" height="8" fill="none" stroke="#333" stroke-width="1.5" rx="2"/>
    <line x1="92" y1="49" x2="106" y2="49" stroke="#333" stroke-width="1.5"/>
  </g>
  
  <!-- Body with money -->
  <g id="body">
    <!-- Torso -->
    <rect x="80" y="75" width="40" height="35" fill="#2d9a6f" rx="5"/>
    
    <!-- Money bills in hand -->
    <rect x="75" y="85" width="12" height="20" fill="#2cb342" rx="2" transform="rotate(-15 81 95)"/>
    <rect x="125" y="85" width="12" height="20" fill="#2cb342" rx="2" transform="rotate(15 131 95)"/>
    
    <!-- Dollar signs on bills -->
    <text x="78" y="98" font-size="10" fill="#ffd700" font-weight="bold">$</text>
    <text x="128" y="98" font-size="10" fill="#ffd700" font-weight="bold">$</text>
  </g>
  
  <!-- Coins stack -->
  <g id="coins">
    <!-- Bottom coin -->
    <ellipse cx="130" cy="125" rx="15" ry="5" fill="#ffa500"/>
    <ellipse cx="130" cy="125" rx="14" ry="4" fill="#ffb84d"/>
    
    <!-- Middle coin -->
    <ellipse cx="130" cy="118" rx="13" ry="4" fill="#ffa500"/>
    <ellipse cx="130" cy="118" rx="12" ry="3.5" fill="#ffb84d"/>
    
    <!-- Top coin -->
    <ellipse cx="130" cy="112" rx="11" ry="3.5" fill="#ffa500"/>
    <ellipse cx="130" cy="112" rx="10" ry="3" fill="#ffb84d"/>
    
    <!-- Dollar signs on coins -->
    <text x="128" y="117" font-size="8" fill="#fff" font-weight="bold">$</text>
    <text x="128" y="124" font-size="8" fill="#fff" font-weight="bold">$</text>
  </g>
  
  <!-- Chart arrows (growth) -->
  <g id="chart">
    <!-- Upward arrow 1 -->
    <polyline points="140,90 160,70 170,80" stroke="#0891b2" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Upward arrow 2 -->
    <polyline points="145,110 165,85 175,95" stroke="#06b6d4" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <!-- Arc at bottom -->
  <path d="M 60 150 Q 100 170 140 150" stroke="#0891b2" stroke-width="4" fill="none" stroke-linecap="round"/>
</svg>
